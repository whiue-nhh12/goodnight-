<!DOCTYPE html>
<html>
<head>
    <title>CUTE CARTOON FOREST WITH MUSIC</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(180deg, #87CEEB 0%, #90EE90 50%, #228B22 100%);
            overflow: hidden;
            font-family: 'Comic Sans MS', cursive;
        }
        
        .tree {
            position: absolute;
            bottom: 0;
            font-size: 80px;
            animation: treeSway 4s ease-in-out infinite;
        }
        
        .tree-1 { left: 10%; animation-delay: 0s; }
        .tree-2 { left: 30%; animation-delay: 1s; }
        .tree-3 { left: 60%; animation-delay: 2s; }
        .tree-4 { left: 80%; animation-delay: 0.5s; }
        
        @keyframes treeSway {
            0%, 100% { transform: rotate(-3deg); }
            50% { transform: rotate(3deg); }
        }
        
        .animal {
            position: absolute;
            font-size: 40px;
            animation: animalWalk 10s ease-in-out infinite;
        }
        
        .rabbit {
            bottom: 20%;
            animation-delay: 0s;
        }
        
        .squirrel {
            bottom: 30%;
            animation-delay: 3s;
        }
        
        .bird {
            top: 20%;
            animation-delay: 1s;
        }
        
        @keyframes animalWalk {
            0%, 100% { 
                transform: translateX(-100px) scaleX(1);
                left: 0;
            }
            50% { 
                transform: translateX(calc(100vw - 100px)) scaleX(-1);
                left: 100%;
            }
        }
        
        .flower {
            position: absolute;
            bottom: 10%;
            font-size: 30px;
            animation: flowerBloom 5s ease-in-out infinite;
        }
        
        .flower-1 { left: 15%; animation-delay: 0s; }
        .flower-2 { left: 45%; animation-delay: 1s; }
        .flower-3 { left: 75%; animation-delay: 2s; }
        
        @keyframes flowerBloom {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.2) rotate(10deg); }
        }
        
        .butterfly {
            position: absolute;
            font-size: 25px;
            animation: butterflyFly 8s ease-in-out infinite;
        }
        
        @keyframes butterflyFly {
            0%, 100% { 
                transform: translate(0, 0) rotate(0deg);
                left: 20%;
                top: 40%;
            }
            25% { 
                transform: translate(100px, -50px) rotate(15deg);
                left: 40%;
                top: 30%;
            }
            50% { 
                transform: translate(200px, 0) rotate(0deg);
                left: 60%;
                top: 40%;
            }
            75% { 
                transform: translate(100px, 50px) rotate(-15deg);
                left: 80%;
                top: 50%;
            }
        }
        
        .message {
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 45px;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            animation: messageForest 2s ease-in-out infinite;
        }
        
        @keyframes messageForest {
            0%, 100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.1); }
        }
        
        .music-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            border: 2px solid #fff;
            color: #fff;
            padding: 15px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 18px;
            backdrop-filter: blur(10px);
            animation: buttonGlow 1s ease-in-out infinite alternate;
        }
        
        @keyframes buttonGlow {
            from { box-shadow: 0 0 10px #fff; }
            to { box-shadow: 0 0 20px #fff, 0 0 30px #fff; }
        }
    </style>
</head>
<body>
    <div class="tree tree-1">🌳</div>
    <div class="tree tree-2">🌲</div>
    <div class="tree tree-3">🌳</div>
    <div class="tree tree-4">🌲</div>
    
    <div class="animal rabbit">🐰</div>
    <div class="animal squirrel">🐿️</div>
    <div class="animal bird">🐦</div>
    
    <div class="flower flower-1">🌸</div>
    <div class="flower flower-2">🌺</div>
    <div class="flower flower-3">🌻</div>
    
    <div class="butterfly">🦋</div>
    
    <div class="message">CHÚC BÉ NGỦ NGON </div>
    
    <button class="music-control" onclick="toggleMusic()"> Bật/Nhạc</button>
    
    <audio id="forestMusic" loop>
        <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.wav" type="audio/wav">
    </audio>
    
    <script>
        function createLeaves() {
            setInterval(() => {
                for (let i = 0; i < 5; i++) {
                    const leaf = document.createElement('div');
                    leaf.style.position = 'absolute';
                    leaf.style.fontSize = '20px';
                    leaf.style.color = '#228B22';
                    leaf.textContent = '🍃';
                    leaf.style.left = Math.random() * 100 + '%';
                    leaf.style.top = '0';
                    leaf.style.animation = 'leafFall 4s linear forwards';
                    document.body.appendChild(leaf);
                    
                    setTimeout(() => leaf.remove(), 4000);
                }
            }, 2000);
        }
        
        const style = document.createElement('style');
        style.textContent = `
            @keyframes leafFall {
                0% { transform: translateY(-50px) rotate(0deg); opacity: 1; }
                100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
            }
        `;
        document.head.appendChild(style);
        
        function toggleMusic() {
            const music = document.getElementById('forestMusic');
            if (music.paused) {
                music.play();
                document.querySelector('.music-control').textContent = '🔇 Tắt/Nhạc';
            } else {
                music.pause();
                document.querySelector('.music-control').textContent = '🎵 Bật/Nhạc';
            }
        }
        
        window.onload = function() {
            createLeaves();
            // Tự động phát nhạc
            document.getElementById('forestMusic').play();
            document.querySelector('.music-control').textContent = '�� Tắt/Nhạc';
        };
    </script>
</body>
</html>
