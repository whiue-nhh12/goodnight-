<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đăng nhập</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #0f2027 0%, #2c5364 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Arial, sans-serif;
      overflow: hidden;
    }
    .neon-box {
      background: rgba(20, 30, 40, 0.95);
      border-radius: 24px;
      box-shadow: 0 0 40px #00fff7, 0 0 10px #fff;
      padding: 40px 30px 30px 30px;
      width: 350px;
      max-width: 95vw;
      position: relative;
      z-index: 2;
      animation: neonPop 1s cubic-bezier(.68,-0.55,.27,1.55);
    }
    @keyframes neonPop {
      0% { transform: scale(0.7); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .neon-title {
      color: #fff;
      font-size: 2rem;
      text-align: center;
      margin-bottom: 30px;
      letter-spacing: 2px;
      text-shadow: 0 0 10px #00fff7, 0 0 20px #fff;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .neon-error {
      color: red;
      font-size: 0.95rem;
      text-align: center;
      margin-top: -20px;
      margin-bottom: 20px;
      text-shadow: 0 0 10px red, 0 0 20px #fff;
    }
    .neon-form {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .neon-input {
      padding: 12px 16px;
      border-radius: 10px;
      border: none;
      outline: none;
      font-size: 1rem;
      background: #222b3a;
      color: #fff;
      box-shadow: 0 0 10px #00fff7 inset;
      transition: box-shadow 0.2s;
    }
    .neon-input:focus {
      box-shadow: 0 0 20px #00fff7, 0 0 10px #fff inset;
    }
    .neon-btn {
      padding: 12px 0;
      border-radius: 10px;
      border: none;
      background: linear-gradient(90deg, #00fff7, #00bfff);
      color: #222b3a;
      font-size: 1.1rem;
      font-weight: bold;
      letter-spacing: 1px;
      cursor: pointer;
      box-shadow: 0 0 20px #00fff7, 0 0 10px #fff;
      transition: background 0.2s, color 0.2s;
    }
    .neon-btn:hover {
      background: linear-gradient(90deg, #00bfff, #00fff7);
      color: #fff;
    }
    .show-hide {
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #00fff7;
      font-size: 1.2rem;
      cursor: pointer;
      outline: none;
    }
    .input-group {
      position: relative;
      display: flex;
      align-items: center;
    }
    .neon-footer {
      margin-top: 18px;
      text-align: center;
      color: #bffcff;
      font-size: 0.95rem;
      letter-spacing: 1px;
      opacity: 0.8;
    }
    @media (max-width: 500px) {
      .neon-box { padding: 25px 5vw; }
      .neon-title { font-size: 1.3rem; }
    }
  </style>
</head>
<body>
  <div class="neon-box">
    <div class="neon-title">🔐 Đăng nhập Neon</div>

    {% if error %}
      <div class="neon-error">⚠️ {{ error }}</div>
    {% endif %}

    <form class="neon-form" method="POST" action="{% url 'login' %}">
      {% csrf_token %}
      <input class="neon-input" type="text" id="username" name="username" placeholder="👤 Họ tên em" required>
      <div class="input-group">
        <input class="neon-input" type="password" id="password" name="password" placeholder="🔑 Ngày yêu" required>
        <button class="show-hide" type="button" onclick="togglePassword()">👁️</button>
      </div>
      <button class="neon-btn" type="submit">Đăng nhập 🚀</button>
    </form>

    <div class="neon-footer">
      Chưa có tài khoản? <a href="#" style="color:#00fff7;text-decoration:underline;">Đăng ký ngay</a>
    </div>
  </div>

  <script>
    function togglePassword() {
      const pw = document.getElementById('password');
      pw.type = pw.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
