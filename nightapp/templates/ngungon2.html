<!DOCTYPE html>
<html>
<head>
    <title>WOW - Hologram Heart Portal</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: radial-gradient(circle, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        
        .portal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 400px;
            border: 3px solid #00ffff;
            border-radius: 50%;
            animation: portalSpin 4s linear infinite;
            box-shadow: 
                0 0 50px #00ffff,
                inset 0 0 50px rgba(0,255,255,0.3);
        }
        
        @keyframes portalSpin {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }
        
        .hologram-heart {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 120px;
            color: #ff00ff;
            animation: hologramFlicker 0.5s ease-in-out infinite alternate;
            text-shadow: 
                0 0 30px #ff00ff,
                0 0 60px #ff00ff,
                0 0 90px #ff00ff;
            z-index: 10;
        }
        
        @keyframes hologramFlicker {
            from { 
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
                filter: hue-rotate(0deg);
            }
            to { 
                opacity: 0.8;
                transform: translate(-50%, -50%) scale(1.1);
                filter: hue-rotate(30deg);
            }
        }
        
        .energy-rings {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            border: 2px solid #ff00ff;
            border-radius: 50%;
            animation: energyRings 3s ease-in-out infinite;
        }
        
        @keyframes energyRings {
            0%, 100% { 
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 0.3;
                border-color: #ff00ff;
            }
            50% { 
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 0.8;
                border-color: #00ffff;
            }
        }
        
        .particle-field {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #00ffff;
            border-radius: 50%;
            animation: particleOrbit 6s linear infinite;
        }
        
        @keyframes particleOrbit {
            0% { 
                transform: rotate(0deg) translateX(150px) rotate(0deg);
                opacity: 1;
            }
            100% { 
                transform: rotate(360deg) translateX(150px) rotate(-360deg);
                opacity: 0;
            }
        }
        
        .message {
            position: absolute;
            top: 75%;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 26px;
            text-align: center;
            animation: messageHologram 2s ease-in-out infinite;
            text-shadow: 0 0 20px #fff;
        }
        
        @keyframes messageHologram {
            0%, 100% { 
                text-shadow: 0 0 20px #fff, 0 0 40px #00ffff;
            }
            50% { 
                text-shadow: 0 0 30px #fff, 0 0 60px #ff00ff;
            }
        }
        
        .quantum-field {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(255,0,255,0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(0,255,255,0.1) 0%, transparent 50%);
            animation: quantumShift 5s ease-in-out infinite;
        }
        
        @keyframes quantumShift {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }
    </style>
</head>
<body>
    <div class="quantum-field"></div>
    <div class="portal"></div>
    <div class="energy-rings"></div>
    <div class="hologram-heart">💖</div>
    <div class="message">Chúc em một giấc ngủ thật sâu, mơ những giấc mơ thật đẹp và thức dậy với nụ cười trên môi nha 🌙✨</div>
    <button onclick="toggleMusic()" style="position:fixed;bottom:20px;right:20px;z-index:100;font-size:18px;padding:10px 20px;border-radius:20px;background:#00ffff;color:#222;border:none;box-shadow:0 0 20px #00ffff;">🎵 Bật/Tắt nhạc</button>
    <audio id="hologramMusic" loop>
        <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.wav" type="audio/wav">
    </audio>
    
    <script>
        function createParticleField() {
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle-field';
                particle.style.left = '50%';
                particle.style.top = '50%';
                particle.style.animationDelay = (i * 0.3) + 's';
                document.body.appendChild(particle);
            }
        }
        function toggleMusic() {
    var music = document.getElementById('hologramMusic');
    if (music.paused) music.play();
    else music.pause();
}
        window.onload = function() {
            document.getElementById('hologramMusic').play();
            createParticleField();
        };
    </script>
</body>
</html>
