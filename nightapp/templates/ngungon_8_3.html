{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8 Tháng 3 - Điều Kỳ Diệu Từ Các Vì Sao</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050005; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            touch-action: none; 
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #instruction {
            color: #ffb6c1;
            font-size: 1.5rem;
            text-shadow: 0 0 15px #ff1493;
            pointer-events: auto;
            cursor: pointer;
            animation: pulse 1.5s infinite;
            padding: 20px;
            border-radius: 20px;
            background: rgba(255, 105, 180, 0.1);
            border: 1px solid rgba(255, 105, 180, 0.3);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            transition: opacity 1s ease;
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 105, 180, 0.7); }
            50% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(255, 105, 180, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 105, 180, 0); }
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-layer">
        <div id="instruction">Ấn giữ màn hình để bắt đầu</div>
    </div>

    <audio id="bgMusic" loop>
        <source src="{% static 'app/music/50namvesaucut.mp3' %}" type="audio/mpeg">
    </audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>

    <script>
        // --- KHỞI TẠO BIẾN TOÀN CỤC ---
        let scene, camera, renderer, controls;
        let particleSystem, photoGroup;
        let shootingStars = []; 
        
        const NUM_PARTICLES = 25000;
        const HEART_PARTICLES = 5000;  
        const TEXT_PARTICLES = 15000;  
        
        let appState = 'initial'; 

        let positionsState = {
            initial: new Float32Array(NUM_PARTICLES * 3),
            text1: new Float32Array(NUM_PARTICLES * 3),
            text2: new Float32Array(NUM_PARTICLES * 3),
            text3: new Float32Array(NUM_PARTICLES * 3),
            sphere: new Float32Array(NUM_PARTICLES * 3) 
        };

        let colorsState = {
            initial: new Float32Array(NUM_PARTICLES * 3),
            text: new Float32Array(NUM_PARTICLES * 3),
            sphere: new Float32Array(NUM_PARTICLES * 3)
        };

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x050005, 0.0006); 

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 1, 5000);
            camera.position.z = 1300; 

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.autoRotate = false; 

            generateMorphTargets();
            createParticleSystem();
            createShootingStars(); 

            photoGroup = new THREE.Group();
            photoGroup.visible = false;
            scene.add(photoGroup);

            // LOAD ẢNH TỪ STATIC
            const staticBaseUrl = "{% static 'app/image/' %}";
            const myImages = [
                'img1.jpg', 'img2.jpg', 'img3.jpg', 'img4.jpg', 'img5.jpg',
                'img6.jpg', 'img7.jpg', 'img8.jpg', 'img9.jpg', 'img10.jpg',
                'img11.jpg', 'img12.jpg', 'img13.jpg', 'img14.jpg', 'img15.jpg',
                'img16.jpg', 'img17.jpg', 'img18.jpg', 'img19.jpg', 'img20.jpg'
            ];

            myImages.forEach((fileName, index) => {
                const fullUrl = staticBaseUrl + fileName;
                addPhotoToSphere(fullUrl, index, myImages.length);
            });

            window.addEventListener('resize', onWindowResize);
            
            const instructionBtn = document.getElementById('instruction');
            instructionBtn.addEventListener('mousedown', startSequence);
            instructionBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startSequence(); });
        }

        function generateMorphTargets() {
            const colorHeart = new THREE.Color(0xff0000);       
            const colorText = new THREE.Color(0xff0055);        
            const colorBgActive = new THREE.Color(0xff69b4);    
            const colorOrbit = new THREE.Color(0xff69b4);       

            for (let i = 0; i < NUM_PARTICLES; i++) {
                const i3 = i * 3;
                if (i < HEART_PARTICLES) {
                    const t = Math.random() * Math.PI * 2;
                    const scale = 16;
                    positionsState.initial[i3] = scale * 16 * Math.pow(Math.sin(t), 3);
                    positionsState.initial[i3 + 1] = scale * (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                    positionsState.initial[i3 + 2] = (Math.random() - 0.5) * 40; 
                    colorsState.initial[i3] = colorHeart.r;
                    colorsState.initial[i3 + 1] = colorHeart.g;
                    colorsState.initial[i3 + 2] = colorHeart.b;
                } else {
                    const r = 1400 * Math.cbrt(Math.random()); 
                    const theta = Math.random() * 2 * Math.PI;
                    const phi = Math.acos(2 * Math.random() - 1);
                    positionsState.initial[i3] = r * Math.sin(phi) * Math.cos(theta);
                    positionsState.initial[i3 + 1] = r * Math.sin(phi) * Math.sin(theta);
                    positionsState.initial[i3 + 2] = r * Math.cos(phi);
                    colorsState.initial[i3] = colorOrbit.r;
                    colorsState.initial[i3 + 1] = colorOrbit.g;
                    colorsState.initial[i3 + 2] = colorOrbit.b;
                }
                if (i < TEXT_PARTICLES) {
                    colorsState.text[i3] = colorText.r;
                    colorsState.text[i3 + 1] = colorText.g;
                    colorsState.text[i3 + 2] = colorText.b;
                    if (i < HEART_PARTICLES) {
                        positionsState.sphere[i3] = positionsState.initial[i3]; 
                        positionsState.sphere[i3+1] = positionsState.initial[i3+1];
                        positionsState.sphere[i3+2] = positionsState.initial[i3+2];
                        colorsState.sphere[i3] = colorHeart.r;
                        colorsState.sphere[i3+1] = colorHeart.g;
                        colorsState.sphere[i3+2] = colorHeart.b;
                    } else {
                        positionsState.sphere[i3] = 0; positionsState.sphere[i3+1] = 9999; positionsState.sphere[i3+2] = 0;
                        colorsState.sphere[i3] = 0; colorsState.sphere[i3+1] = 0; colorsState.sphere[i3+2] = 0;
                    }
                } else {
                    const getRandomBg = () => {
                        const r = 1800 * Math.cbrt(Math.random()); 
                        const theta = Math.random() * 2 * Math.PI;
                        const phi = Math.acos(2 * Math.random() - 1);
                        return { x: r * Math.sin(phi) * Math.cos(theta), y: r * Math.sin(phi) * Math.sin(theta), z: r * Math.cos(phi) };
                    };
                    let p1 = getRandomBg(); positionsState.text1[i3] = p1.x; positionsState.text1[i3+1] = p1.y; positionsState.text1[i3+2] = p1.z;
                    let p2 = getRandomBg(); positionsState.text2[i3] = p2.x; positionsState.text2[i3+1] = p2.y; positionsState.text2[i3+2] = p2.z;
                    let p3 = getRandomBg(); positionsState.text3[i3] = p3.x; positionsState.text3[i3+1] = p3.y; positionsState.text3[i3+2] = p3.z;
                    colorsState.text[i3] = colorBgActive.r;
                    colorsState.text[i3 + 1] = colorBgActive.g;
                    colorsState.text[i3 + 2] = colorBgActive.b;
                    positionsState.sphere[i3] = 0; positionsState.sphere[i3+1] = 9999; positionsState.sphere[i3+2] = 0;
                    colorsState.sphere[i3] = 0; colorsState.sphere[i3+1] = 0; colorsState.sphere[i3+2] = 0;
                }
            }
            const text1Points = getPointsFromText("Chúc Mừng", 250);
            const text2Points = getPointsFromText("Ngày Quốc Tế\nPhụ Nữ", 180);
            const text3Points = getPointsFromText("Mùng 8 Tháng 3", 220);
            fillArrayWithPoints(positionsState.text1, text1Points, TEXT_PARTICLES);
            fillArrayWithPoints(positionsState.text2, text2Points, TEXT_PARTICLES);
            fillArrayWithPoints(positionsState.text3, text3Points, TEXT_PARTICLES);
        }

        function getPointsFromText(text, fontSize) {
            const width = 2048; 
            const height = 2048; 
            const canvas = document.createElement('canvas');
            canvas.width = width; canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, width, height);
            ctx.font = `900 ${fontSize}px 'Segoe UI', Arial`; 
            ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; 
            ctx.lineWidth = 10; ctx.strokeStyle = '#fff';
            const lines = text.split('\n');
            const lineHeight = fontSize * 1.2;
            const totalTextHeight = lines.length * lineHeight;
            let currentY = (height / 2) - (totalTextHeight / 2) + (lineHeight / 2);
            lines.forEach((line) => {
                ctx.fillText(line, width / 2, currentY);
                ctx.strokeText(line, width / 2, currentY); 
                currentY += lineHeight;
            });
            const imgData = ctx.getImageData(0, 0, width, height).data;
            const finalPoints = [];
            const scale = 1400 / 2048; 
            for (let y = 0; y < height; y += 4) {
                for (let x = 0; x < width; x += 4) {
                    const idx = (y * width + x) * 4; 
                    if (imgData[idx] > 128) { 
                        const x3D = (x - width / 2) * scale;
                        const y3D = -(y - height / 2) * scale;
                        const z3D = (Math.random() - 0.5) * 30;
                        finalPoints.push(new THREE.Vector3(x3D, y3D, z3D));
                    }
                }
            }
            return finalPoints;
        }

        function fillArrayWithPoints(array, pointsList, limit) {
            if(pointsList.length === 0) return;
            for (let i = 0; i < limit; i++) {
                const pointIndex = Math.floor((i / limit) * pointsList.length); 
                const pt = pointsList[pointIndex]; 
                array[i*3] = pt.x; array[i*3+1] = pt.y; array[i*3+2] = pt.z;
            }
        }

        function createParticleSystem() {
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(positionsState.initial.slice(), 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colorsState.initial.slice(), 3));
            const canvas = document.createElement('canvas');
            canvas.width = 32; canvas.height = 32;
            const context = canvas.getContext('2d');
            const gradient = context.createRadialGradient(16, 16, 0, 16, 16, 16);
            gradient.addColorStop(0, 'rgba(255,255,255,1)');
            gradient.addColorStop(1, 'rgba(0,0,0,0)');
            context.fillStyle = gradient; context.fillRect(0, 0, 32, 32);
            const texture = new THREE.Texture(canvas);
            texture.needsUpdate = true;
            const material = new THREE.PointsMaterial({
                size: 9, map: texture, vertexColors: true, blending: THREE.AdditiveBlending, transparent: true, depthWrite: false
            });
            particleSystem = new THREE.Points(geometry, material);
            scene.add(particleSystem);
        }

        function createShootingStars() {
            for (let i = 0; i < 8; i++) {
                const geometry = new THREE.BufferGeometry();
                const posArr = new Float32Array(2 * 3); 
                geometry.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
                const material = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0 });
                const star = new THREE.Line(geometry, material);
                star.userData = { active: false, speed: 12 + Math.random() * 15 };
                scene.add(star);
                shootingStars.push(star);
            }
        }

        function resetStar(star) {
            const x = (Math.random() - 0.5) * 3000;
            const y = 800 + Math.random() * 500;
            const z = (Math.random() - 0.5) * 1000;
            star.position.set(x, y, z);
            star.material.opacity = 0.8;
            star.userData.active = true;
            const pos = star.geometry.attributes.position.array;
            pos[0] = 0; pos[1] = 0; pos[2] = 0;
            pos[3] = 120; pos[4] = 120; pos[5] = 0; 
            star.geometry.attributes.position.needsUpdate = true;
        }

        function startSequence() {
            if(appState !== 'initial') return;
            appState = 'text';
            const music = document.getElementById("bgMusic");
            if (music) { music.play().catch(e => console.log(e)); }
            document.getElementById('instruction').style.opacity = '0';
            
            morphParticles(positionsState.text1, colorsState.text, 2500)
                .onComplete(() => {
                    setTimeout(() => {
                        morphParticles(positionsState.text2, colorsState.text, 2000)
                            .onComplete(() => {
                                setTimeout(() => {
                                    morphParticles(positionsState.text3, colorsState.text, 2000)
                                        .onComplete(() => {
                                            setTimeout(() => { transitionToSphere(); }, 1500);
                                        });
                                }, 1500);
                            });
                    }, 1500);
                });
        }

        function morphParticles(targetPositions, targetColors, duration) {
            const positionAttr = particleSystem.geometry.attributes.position;
            const colorAttr = particleSystem.geometry.attributes.color;
            const startPositions = new Float32Array(positionAttr.array);
            const startColors = new Float32Array(colorAttr.array);
            return new TWEEN.Tween({ t: 0 }).to({ t: 1 }, duration).easing(TWEEN.Easing.Cubic.InOut)
                .onUpdate((obj) => {
                    for(let i = 0; i < NUM_PARTICLES * 3; i++) {
                        positionAttr.array[i] = THREE.MathUtils.lerp(startPositions[i], targetPositions[i], obj.t);
                        colorAttr.array[i] = THREE.MathUtils.lerp(startColors[i], targetColors[i], obj.t);
                    }
                    positionAttr.needsUpdate = true; colorAttr.needsUpdate = true;
                }).start();
        }

        function transitionToSphere() {
            appState = 'sphere';
            
            // Tạo layer fade to black
            const fadeLayer = document.createElement('div');
            fadeLayer.id = 'fade-to-black';
            fadeLayer.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-color: #000;
                opacity: 0;
                z-index: 100;
                pointer-events: none;
                transition: opacity 2s ease-in-out;
            `;
            document.body.appendChild(fadeLayer);

            // Fade to black
            setTimeout(() => {
                fadeLayer.style.opacity = '1';
            }, 50);

            // Fade back from black
            setTimeout(() => {
                fadeLayer.style.transition = 'opacity 1.5s ease-in-out';
                fadeLayer.style.opacity = '0';
                setTimeout(() => fadeLayer.remove(), 1500);
            }, 2050);

            // Morph các hạt background sang dạng cầu tán xạ mượt
            setTimeout(() => {
                morphParticles(positionsState.sphere, colorsState.sphere, 3000);
            }, 1500);
            
            // Hiện quả cầu ảnh với hiệu ứng mượt
            setTimeout(() => {
                photoGroup.visible = true;
                photoGroup.scale.set(0.001, 0.001, 0.001);
                photoGroup.rotation.y = Math.PI;

                new TWEEN.Tween(photoGroup.scale)
                    .to({ x: 1, y: 1, z: 1 }, 4000)
                    .easing(TWEEN.Easing.Quadratic.Out)
                    .start();

                new TWEEN.Tween(photoGroup.rotation)
                    .to({ y: 0 }, 4000)
                    .easing(TWEEN.Easing.Quadratic.Out)
                    .start();
            }, 2000);
        }

        function addPhotoToSphere(url, index, total) {
            const textureLoader = new THREE.TextureLoader();
            textureLoader.setCrossOrigin("Anonymous"); 
            textureLoader.load(url, function(texture) {
                const material = new THREE.MeshBasicMaterial({ 
                    map: texture, 
                    side: THREE.DoubleSide, 
                    transparent: true, 
                    opacity: 0.9 
                });
                const geometry = new THREE.PlaneGeometry(180, 240); 
                const plane = new THREE.Mesh(geometry, material);
                const radius = 550; 
                const phi = Math.acos(1 - 2 * (index + 0.5) / total);
                const theta = Math.PI * (1 + Math.sqrt(5)) * index;
                plane.position.x = radius * Math.cos(theta) * Math.sin(phi);
                plane.position.y = radius * Math.sin(theta) * Math.sin(phi);
                plane.position.z = radius * Math.cos(phi);
                plane.lookAt(0, 0, 0);
                photoGroup.add(plane);
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            TWEEN.update();
            controls.update();

            if (appState === 'sphere') {
                shootingStars.forEach(star => {
                    if (!star.userData.active && Math.random() < 0.015) { resetStar(star); }
                    if (star.userData.active) {
                        star.position.x -= star.userData.speed;
                        star.position.y -= star.userData.speed;
                        star.material.opacity -= 0.008;
                        if (star.material.opacity <= 0) star.userData.active = false;
                    }
                });
            }

            if (particleSystem) {
                const time = Date.now() * 0.001;
                if (appState === 'initial' || appState === 'sphere') {
                    particleSystem.scale.setScalar(1 + Math.sin(time * 3) * 0.05);
                }

                if (appState === 'initial' || appState === 'text') {
                    const pos = particleSystem.geometry.attributes.position.array;
                    const cosA = Math.cos(0.0015);
                    const sinA = Math.sin(0.0015);
                    const startIdx = (appState === 'initial') ? HEART_PARTICLES : TEXT_PARTICLES;
                    for (let i = startIdx; i < NUM_PARTICLES; i++) {
                        const i3 = i * 3;
                        const x = pos[i3];
                        const z = pos[i3+2];
                        pos[i3] = x * cosA - z * sinA;
                        pos[i3+2] = x * sinA + z * cosA;
                    }
                    particleSystem.geometry.attributes.position.needsUpdate = true;
                }
            }

            if (appState === 'sphere' && photoGroup.visible) {
                photoGroup.rotation.y += 0.0025; 
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
