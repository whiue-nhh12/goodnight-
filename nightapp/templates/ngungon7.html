<!DOCTYPE html>
<html>
<head>
    <title>CUTE CARTOON OCEAN WITH DIVERSE MUSIC</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(180deg, #87CEEB 0%, #4682B4 100%);
            overflow: hidden;
            font-family: 'Comic Sans MS', cursive;
        }
        
        .fish {
            position: absolute;
            font-size: 30px;
            animation: fishSwim 8s ease-in-out infinite;
        }
        
        .fish-1 {
            top: 30%;
            animation-delay: 0s;
        }
        
        .fish-2 {
            top: 50%;
            animation-delay: 2s;
        }
        
        .fish-3 {
            top: 70%;
            animation-delay: 4s;
        }
        
        @keyframes fishSwim {
            0%, 100% { 
                transform: translateX(-100px) scaleX(1);
                left: 0;
            }
            50% { 
                transform: translateX(calc(100vw - 100px)) scaleX(-1);
                left: 100%;
            }
        }
        
        .bubble {
            position: absolute;
            width: 20px;
            height: 20px;
            background: rgba(255,255,255,0.6);
            border-radius: 50%;
            animation: bubbleRise 4s linear infinite;
        }
        
        @keyframes bubbleRise {
            0% { 
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            50% { 
                opacity: 1;
            }
            100% { 
                transform: translateY(-100px) scale(1);
                opacity: 0;
            }
        }
        
        .coral {
            position: absolute;
            bottom: 0;
            font-size: 40px;
            animation: coralSway 3s ease-in-out infinite;
        }
        
        .coral-1 { left: 10%; animation-delay: 0s; }
        .coral-2 { left: 30%; animation-delay: 1s; }
        .coral-3 { left: 70%; animation-delay: 2s; }
        .coral-4 { left: 90%; animation-delay: 0.5s; }
        
        @keyframes coralSway {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }
        
        .octopus {
            position: absolute;
            font-size: 50px;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            animation: octopusDance 4s ease-in-out infinite;
        }
        
        @keyframes octopusDance {
            0%, 100% { transform: translateX(-50%) rotate(0deg); }
            25% { transform: translateX(-50%) rotate(10deg); }
            75% { transform: translateX(-50%) rotate(-10deg); }
        }
        
        .message {
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 56px;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            animation: messageFloat 3s ease-in-out infinite;
        }
        
        @keyframes messageFloat {
            0%, 100% { transform: translateX(-50%) translateY(0px); }
            50% { transform: translateX(-50%) translateY(-15px); }
        }
        
        .music-controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .music-btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid #fff;
            color: #fff;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            backdrop-filter: blur(10px);
            animation: buttonGlow 1s ease-in-out infinite alternate;
        }
        
        @keyframes buttonGlow {
            from { box-shadow: 0 0 10px #fff; }
            to { box-shadow: 0 0 20px #fff, 0 0 30px #fff; }
        }
        
        .music-info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 14px;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <div class="fish fish-1">🐠</div>
    <div class="fish fish-2">🐟</div>
    <div class="fish fish-3">🐡</div>
    <div class="octopus">🐙</div>
    <div class="coral coral-1">🌿</div>
    <div class="coral coral-2">🌿</div>
    <div class="coral coral-3">🌿</div>
    <div class="coral coral-4">🌿</div>
    <div class="message">NGƯỜI ĐẸP NGỦ NGON🌊</div>
    
    
    <div class="music-controls">
        <button class="music-btn" onclick="toggleMusic()">�� Tắt/Nhạc</button>
    </div>
    
    <audio id="wavesMusic" loop>
        <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.wav" type="audio/wav">
    </audio>
    
    <audio id="tropicalMusic" loop>
        <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.wav" type="audio/wav">
    </audio>
    
    <audio id="relaxingMusic" loop>
        <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.wav" type="audio/wav">
    </audio>
    
    <script>
        let currentMusic = null;
        
        function createBubbles() {
            setInterval(() => {
                for (let i = 0; i < 3; i++) {
                    const bubble = document.createElement('div');
                    bubble.className = 'bubble';
                    bubble.style.left = Math.random() * 100 + '%';
                    document.body.appendChild(bubble);
                    
                    setTimeout(() => bubble.remove(), 4000);
                }
            }, 1000);
        }
        
        function playMusic(type) {
            // Dừng tất cả nhạc
            document.getElementById('wavesMusic').pause();
            document.getElementById('tropicalMusic').pause();
            document.getElementById('relaxingMusic').pause();
            
            // Phát nhạc được chọn
            const music = document.getElementById(type + 'Music');
            music.play();
            currentMusic = music;
            
            // Cập nhật thông tin
            const musicNames = {
                'waves': 'Ocean Waves',
                'tropical': 'Tropical Beats',
                'relaxing': 'Relaxing Sea'
            };
            document.querySelector('.music-info').innerHTML = `<div>�� ${musicNames[type]}</div>`;
        }
        
        function toggleMusic() {
            if (currentMusic && !currentMusic.paused) {
                currentMusic.pause();
                document.querySelector('.music-info').innerHTML = '<div>🔇 Nhạc đã tắt</div>';
            } else if (currentMusic) {
                currentMusic.play();
                document.querySelector('.music-info').innerHTML = '<div>🎵 Nhạc đang phát</div>';
            }
        }
        
        window.onload = function() {
            createBubbles();
            // Tự động phát nhạc waves
            playMusic('waves');
        };
    </script>
</body>
</html>
