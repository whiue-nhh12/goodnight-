{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Slot Chúc Ngủ Ngon - Hiếu</title>
  <style>
    body {
      background-image: url('https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif');
      background-size: cover;
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      padding: 50px;
      color: white;
      animation: fadeIn 1s;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    h1 {
      font-size: 48px;
      margin-bottom: 40px;
      text-shadow: 2px 2px 4px #000;
      animation: bounce 1s infinite;
    }

    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% {
        transform: translateY(0);
      }
      40% {
        transform: translateY(-20px);
      }
      60% {
        transform: translateY(-10px);
      }
    }

    .slot-machine {
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgba(0, 0, 0, 0.8);
      padding: 30px;
      border: 6px solid #fff;
      border-radius: 20px;
      width: 600px;
      margin: 0 auto;
      box-shadow: 0 0 30px #fff;
      transition: transform 0.3s;
    }

    .slot-machine:hover {
      transform: scale(1.05);
    }

    .reel {
      background: linear-gradient(135deg, #fff, #e0e0e0);
      color: #111;
      width: 120px;
      height: 100px;
      margin: 0 10px;
      font-size: 36px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 10px;
      box-shadow: inset 0 0 10px #000;
      transition: transform 0.2s;
    }

    .reel:hover {
      transform: rotate(5deg);
    }

    .lever {
      margin-top: 40px;
      width: 50px;
      height: 150px;
      background: linear-gradient(to bottom, #e60000, #b30000);
      border-radius: 20px;
      position: relative;
      margin-left: auto;
      margin-right: auto;
      cursor: pointer;
      box-shadow: 0 0 10px yellow;
      transition: transform 0.2s;
    }

    .lever:active {
      transform: rotate(20deg);
    }

    .knob {
      width: 40px;
      height: 40px;
      background: radial-gradient(circle, #ff0, #cc0);
      border-radius: 50%;
      position: absolute;
      top: -30px;
      left: 5px;
      border: 2px solid #333;
    }

    .music-btn {
      margin-top: 30px;
      padding: 15px 30px;
      font-size: 20px;
      border: none;
      background-color: #4CAF50;
      color: white;
      border-radius: 10px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .music-btn:hover {
      background-color: #45a049;
    }

    .note {
      font-size: 16px;
      color: #ffd;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h1>🎉 Máy Slot Chúc Ngủ Ngon ✨</h1>

  <div class="slot-machine">
    <div class="reel" id="reel1">😴</div>
    <div class="reel" id="reel2">🌙</div>
    <div class="reel" id="reel3">💤</div>
  </div>

  <div class="lever" onclick="pullLever()">
    <div class="knob"></div>
  </div>

  <button class="music-btn" onclick="playMusic()">🎵 Bật nhạc nền</button>

 <audio id="spinSound" src="{% static 'spin.mp3' %}" preload="auto"></audio>
<audio id="bgMusic" src="{% static 'chicken.mp3' %}" preload="auto" loop></audio>
<audio id="endSound" src="https://cdn.pixabay.com/audio/2022/03/15/audio_a22b928f42.mp3" preload="auto"></audio>

<script>
  const links = [
    "chuc-ngu-1.html",
    "chuc-ngu-2.html",
    "chuc-ngu-3.html",
    "chuc-ngu-4.html",
    "chuc-ngu-5.html"
  ];
    function getRandomEmoji() {
      const emojis = ["🌙", "😴", "💤", "✨", "🌟", "🌌"];
      return emojis[Math.floor(Math.random() * emojis.length)];
    }

    function playMusic() {
      const bgMusic = document.getElementById("bgMusic");
      bgMusic.play().catch(error => {
        console.warn("Trình duyệt chặn autoplay:", error);
        alert("🎵 Hãy chạm vào màn hình để bật nhạc nhé!");
      });
    }

    function pullLever() {
      const reel1 = document.getElementById("reel1");
      const reel2 = document.getElementById("reel2");
      const reel3 = document.getElementById("reel3");
      const spinSound = document.getElementById("spinSound");
      const endSound = document.getElementById("endSound");
      const bgMusic = document.getElementById("bgMusic");

      bgMusic.play().catch(err => {
        console.warn("Không phát được nhạc nền khi gạt:", err);
      });

      let count = 0;
      const maxCount = 30;
      spinSound.play();

      const interval = setInterval(() => {
        reel1.textContent = getRandomEmoji();
        reel2.textContent = getRandomEmoji();
        reel3.textContent = getRandomEmoji();
        count++;
        if (count >= maxCount) {
          clearInterval(interval);
          endSound.play();
          const target = links[Math.floor(Math.random() * links.length)];
          setTimeout(() => {
            window.location.href = target;
          }, 800);
        }
      }, 80);
    }
  </script>
</body>
</html>
